micronaut.application.name=todo

micronaut.server.context-path=/todo
micronaut.server.netty.compression.enabled=false
application.cors.allowed-origins=http://localhost:3000


micronaut.router.static-resources.default.enabled=true
micronaut.router.static-resources.default.paths=classpath:public
micronaut.router.static-resources.default.mapping=/**
micronaut.router.static-resources.swagger.paths=classpath:META-INF/swagger
micronaut.router.static-resources.swagger.mapping=/openapi/**
micronaut.router.static-resources.redoc.paths=classpath:META-INF/swagger/views/redoc
micronaut.router.static-resources.redoc.mapping=/openapi/**

datasources.default.url=jdbc:h2:file:./todo.db;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE;DEFAULT_NULL_ORDERING=HIGH
datasources.default.driverClassName=org.h2.Driver
datasources.default.dialect=POSTGRES
datasources.default.username=sa
datasources.default.password=

flyway.datasources.default.enabled=true
 
# Datasource Pooling
datasources.default.hikari.minimum-idle=1
datasources.default.hikari.maximum-pool-size=10
 
# Caffeine Cache
micronaut.caches.todos.maximum-size=500
micronaut.caches.todos.expire-after-write=1h
 
endpoints.all.enabled=true
endpoints.all.sensitive=false
endpoints.all.path=/management

otel.exporter.otlp.endpoint=http://localhost:4318

# Security
micronaut.security.enabled=false
micronaut.security.authentication=bearer

# Allow all by default (trust controller annotations for private endpoints)
micronaut.security.default-rule=isAuthenticated()

micronaut.security.token.jwt.enabled=true
micronaut.security.token.jwt.signatures.secret.generator.secret=${JWT_SECRET:todo-vibe-jwt-secret-change-in-production-min-32-chars}
micronaut.security.token.jwt.generator.access-token-expiration=3600
# Note: Micronaut 4 uses seconds for jwt.generator.access-token-expiration in some places, but let's check.
# Actually, default is often 3600 (seconds). 

micronaut.security.token.jwt.generator.refresh-token.enabled=true

micronaut.security.endpoints.login.path=/api/auth/login
micronaut.security.endpoints.logout.path=/api/auth/logout
micronaut.security.endpoints.refresh.path=/api/auth/refresh

# Data Initialization
data-initialization.enabled=true

# Delay (for UI testing)
application.delay.enabled=true
application.delay.duration=3000