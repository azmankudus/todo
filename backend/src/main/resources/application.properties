micronaut.application.name=todo

micronaut.server.context-path=/todo
micronaut.server.cors.enabled=true
micronaut.server.cors.configurations.web.allowed-origins=http://localhost:3000

micronaut.router.static-resources.default.enabled=true
micronaut.router.static-resources.default.paths=classpath:public
micronaut.router.static-resources.default.mapping=/**
micronaut.router.static-resources.swagger.paths=classpath:META-INF/swagger
micronaut.router.static-resources.swagger.mapping=/openapi/**
micronaut.router.static-resources.redoc.paths=classpath:META-INF/swagger/views/redoc
micronaut.router.static-resources.redoc.mapping=/openapi/**

datasources.default.url=jdbc:duckdb:./todo.db
datasources.default.driverClassName=org.duckdb.DuckDBDriver
datasources.default.dialect=ANSI
datasources.default.readOnly=false

flyway.datasources.default.enabled=true

endpoints.all.enabled=true
endpoints.all.sensitive=false
endpoints.all.path=/management

otel.exporter.otlp.endpoint=http://localhost:4318

application.delay.enabled=true
application.delay.duration=3000
